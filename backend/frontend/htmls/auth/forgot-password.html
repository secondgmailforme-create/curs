<!--html страница для Восстановление пароля -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Восстановление пароля</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/css/pages/auth.css">
    <canvas id="dataCanvas"></canvas> 
    <script src="/scripts-js/auth/canvas.js"></script>
</head>
<body>
    <div class="authform">
        <header>
            <h1 style="margin: 20px;">Забыли пароль?</h1>
        </header>
        <article>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                Введите email, указанный при регистрации.<br>Мы отправим ссылку для сброса.
            </p>
            <form id="forgotForm" onsubmit="event.preventDefault(); forgotPasswordHandler();">
                <input required placeholder="Введите ваш email" id="forgotEmailInput" type="email">
                <button type="submit" name="auth">Отправить ссылку</button>
            </form>
        </article>
        <div class="separator1">
            <a href="login-client.html">Вернуться ко входу</a>
        </div>
    </div>
    <footer class="under">
        <p>© Все права защищены 2026г.</p>
    </footer>
    <script src="/scripts-js/auth/auth.js"></script>
</body>
</html>
