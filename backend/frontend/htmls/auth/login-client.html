<!--html входа на сайт-->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <link rel="stylesheet" href="/css/pages/auth.css">
    <canvas id="dataCanvas"></canvas>
</head>
<body>

    <div class="authform">
        <header>
            <h1 class="tittleauthwindow">Добро пожаловать!</h1>
        </header>
        <article>
            <form onsubmit="AuthClient(event); return false;">
                <input required placeholder="Введите email" id="emailform">
                <input required placeholder="Введите пароль" id="passwordform" type="password">
                <div id="forgotPasswordLink" style="display:none; margin-top: 10px;">
                    <a href="/htmls/auth/forgot-password.html" style="color:blueviolet; text-decoration: none; font-size: 14px;">Забыли пароль? Восстановить</a>
                </div>
                <button type="submit" name="auth" id="bubbleButton">Войти</button>
            </form>
            <p>Или через</p>
        </article>
        <footer>
            <div class="buttongog">
                <button class="networkbutton" onclick="location.href='/api/auth/google'">
                    <svg width="25" height="25" viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    </svg>
                </button>
                <button class="networkbutton" onclick="location.href='/api/auth/yandex'">
                    <svg width="25" height="25" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.04 12c0-5.523 4.476-10 10-10 5.522 0 10 4.477 10 10s-4.478 10-10 10c-5.524 0-10-4.477-10-10z" fill="#FC3F1D"/>
                        <path d="M13.32 7.666h-.924c-1.694 0-2.585.858-2.585 2.123 0 1.43.616 2.1 1.881 2.959l1.045.704-3.003 4.487H7.49l2.695-4.014c-1.55-1.111-2.42-2.19-2.42-4.015 0-2.288 1.595-3.85 4.62-3.85h3.003v11.868H13.32V7.666z" fill="#fff"/>
                    </svg>
                </button>
                <button class="networkbutton" onclick="location.href='/api/auth/vk'">
                    <svg width="25px" height="25px" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="512" cy="512" r="512" style="fill:#2787f5"/>
                        <path d="M585.83 271.5H438.17c-134.76 0-166.67 31.91-166.67 166.67v147.66c0 134.76 31.91 166.67 166.67 166.67h147.66c134.76 0 166.67-31.91 166.67-166.67V438.17c0-134.76-32.25-166.67-166.67-166.67zm74 343.18h-35c-13.24 0-17.31-10.52-41.07-34.62-20.71-20-29.87-22.74-35-22.74-7.13 0-9.17 2-9.17 11.88v31.57c0 8.49-2.72 13.58-25.12 13.58-37 0-78.07-22.4-106.93-64.16-43.45-61.1-55.33-106.93-55.33-116.43 0-5.09 2-9.84 11.88-9.84h35c8.83 0 12.22 4.07 15.61 13.58 17.31 49.9 46.17 93.69 58 93.69 4.41 0 6.45-2 6.45-13.24v-51.6c-1.36-23.76-13.92-25.8-13.92-34.28 0-4.07 3.39-8.15 8.83-8.15h55c7.47 0 10.18 4.07 10.18 12.9v69.58c0 7.47 3.39 10.18 5.43 10.18 4.41 0 8.15-2.72 16.29-10.86 25.12-28.17 43.11-71.62 43.11-71.62 2.38-5.09 6.45-9.84 15.28-9.84h35c10.52 0 12.9 5.43 10.52 12.9-4.41 20.37-47.18 80.79-47.18 80.79-3.73 6.11-5.09 8.83 0 15.61 3.73 5.09 16 15.61 24.1 25.12 14.94 17 26.48 31.23 29.53 41.07 3.45 9.84-1.65 14.93-11.49 14.93z" style="fill:#fff"/>
                    </svg>
                </button>
            </div>
        </footer>
        <div class="separator">
            <a href="/htmls/auth/register-client.html">Регистрация</a>
            <span>|</span>
            <a href="/htmls/auth/login-personal.html">Вход для сотрудников</a>
        </div>
    </div>
    <footer class="under"><p>©Все права защищены 2026г.</p></footer>

    <script src="/scripts-js/auth/auth.js"></script>
    <script src="/scripts-js/auth/canvas.js"></script>
    <script>
        fetch('/api/auth/me', { credentials: 'include' })
            .then(res => {
                if (res.ok) window.location.href = '/frontend/main-module.html';
                else document.body.classList.add('loaded');
            });
    </script>
</body>
</html>
