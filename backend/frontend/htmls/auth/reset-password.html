 <!--html страница для сброса пароля-->
<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Сброс пароля</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="/css/pages/auth.css">
    <canvas id="dataCanvas"></canvas>
    <script src="/scripts-js/auth/canvas.js"></script> 
    <script src="/scripts-js/auth/auth.js"></script>
</head>
<body>
    <div class="authform">
        <header>
            <h1 style="margin: 20px;">Новый пароль</h1>
        </header>
        <article>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">
                Придумайте надежный пароль
            </p>
            <form onsubmit="resetPassword(event); return false;">
                <input required placeholder="Введите новый пароль" id="newPasswordInput" type="password" minlength="6">
                <input required placeholder="Повторите новый пароль" id="confirmPasswordInput" type="password" minlength="6">
                <button type="submit" name="auth">Сохранить пароль</button>
            </form>
        </article>
        <div class="separator1">
            <a href="login-personal.html">Вернуться ко входу</a>
        </div>
    </div>
    <footer class="under">
        <p>© Все права защищены 2026г.</p>
    </footer>
</body>
</html>
