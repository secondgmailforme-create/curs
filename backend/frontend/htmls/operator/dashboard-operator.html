<!-- статистика оператора -->
    <canvas id="Canvas"></canvas>

    <header >
      <h1 style="color:rgb(223, 165, 250); font-size: 30px;font-family: cursive;">Обзор активности</h1>
      <a class="btn-new" href = "/OPERATOR-CHAT" data-page="operator-chat">💬 Чат с клиентом</a>
    </header>

    <div class="stats-grid">

      <div class="card">
          <h3>Всего заявок</h3>
          <div class="value" id = "counttickets"></div>
          <div class="trend negative" id = "mintime"></div>
      </div>

      <div class="card">
          <h3>В работе</h3>
          <div class="value" id = "worktickets"></div>
          <div class="trend negative" id = "wartick"></div>
      </div>

       <div class="card">
          <h3>Решено</h3>
          <div class="value" id = "successtic"></div>
          <div class="trend" id = "process"></div>
       </div>

        <div class="card">
            <h3>Среднее время</h3>
            <div class="value" id = "timetickets"></div>
            <div class="trend" id = "aitickets"></div>
        </div>

        <div class="card">
            <h3>Рейтинг</h3>
            <div class="value" id = "ratingvalue"></div>
            <div class="trend" id = "ratingcomment"></div>
        </div>

        </div>
        <div class="recent-tickets">

          <h2 class="section-title">Последние обращения</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Описание</th>
                <th>Дата</th>
                <th>Категория</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody id = "tabletick">
            </tbody>
          </table>
          
        </div>
